# ========================================
# CI 流水线 - 持续集成
# 触发条件：推送到 main/develop 分支，或 PR
# ========================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 并发控制：同一分支只运行最新的工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================
  # 代码质量检查
  # ========================================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行 ESLint
        run: npm run lint

      - name: 类型检查
        run: npm run typecheck

  # ========================================
  # 单元测试
  # ========================================
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 运行测试
        run: npm run test -- --coverage

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ========================================
  # 构建测试
  # ========================================
  build:
    name: 构建测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 生成 Prisma Client
        run: npx prisma generate

      - name: 构建应用
        run: npm run build
        env:
          # 构建时需要的环境变量（使用空值即可，实际值在部署时注入）
          DATABASE_URL: postgresql://user:pass@localhost:5432/test
          NEXTAUTH_SECRET: build-time-secret-key-min-32-characters
          NEXTAUTH_URL: http://localhost:3000

  # ========================================
  # Docker 镜像构建测试
  # ========================================
  docker-build:
    name: Docker 构建测试
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建镜像（不推送）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: nexus-chat:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # 安全扫描
  # ========================================
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行 npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
