# ========================================
# CD 流水线 - 持续部署到阿里云
# 触发条件：推送到 main 分支
# ========================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  # ========================================
  # 构建并推送 Docker 镜像
  # ========================================
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ALIYUN_REGISTRY }}/nexus-chat
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # 部署到阿里云 ECS
  # ========================================
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到阿里云 ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            # 进入项目目录
            cd /opt/nexus-chat
            
            # 拉取最新代码
            git pull origin main
            
            # 拉取最新镜像
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/nexus-chat:latest
            
            # 执行数据库迁移
            docker compose run --rm app npx prisma migrate deploy
            
            # 重启服务
            docker compose up -d --remove-orphans
            
            # 清理旧镜像
            docker image prune -f
            
            # 检查服务状态
            docker compose ps

      - name: 健康检查
        run: |
          sleep 30
          curl -f ${{ secrets.APP_URL }}/api/health || exit 1

  # ========================================
  # 部署通知
  # ========================================
  notify:
    name: 发送部署通知
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    steps:
      - name: 发送钉钉通知
        if: ${{ secrets.DINGTALK_WEBHOOK }}
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DINGTALK_WEBHOOK }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "部署通知",
                "text": "### 部署通知\n\n- **状态**: ${{ needs.deploy.result }}\n- **分支**: ${{ github.ref_name }}\n- **提交**: ${{ github.sha }}\n- **触发者**: ${{ github.actor }}\n- **时间**: ${{ github.event.head_commit.timestamp }}"
              }
            }
