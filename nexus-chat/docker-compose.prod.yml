# ========================================
# Docker Compose 配置 - 生产环境
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ========================================

version: '3.8'

services:
  # ========================================
  # Next.js 应用服务
  # ========================================
  app:
    image: ${ALIYUN_REGISTRY}/nexus-chat:${IMAGE_TAG:-latest}
    container_name: nexus-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
      - ALIBABA_API_KEY=${ALIBABA_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-alibaba}
      - AI_MODEL=${AI_MODEL:-qwen-plus}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Socket.io 消息服务（生产配置）
  # ========================================
  socket-server:
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - REDIS_URL=redis://redis:6379
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # PostgreSQL（生产配置）
  # ========================================
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis（生产配置）
  # ========================================
  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports: []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
