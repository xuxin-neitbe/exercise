server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: {{PROJECT_NAME}}
  datasource:
    url: jdbc:mysql://localhost:3306/{{PROJECT_NAME}}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  mybatis:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.example.demo.model
    configuration:
      map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET:change-it-to-a-secure-secret-key}
  expiration: 86400000  # 24 小时

# 日志配置
logging:
  level:
    root: INFO
    com.example.demo: DEBUG
