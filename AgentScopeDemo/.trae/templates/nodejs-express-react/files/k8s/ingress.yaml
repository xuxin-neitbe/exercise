apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{PROJECT_NAME}}-ingress
  namespace: {{K8S_NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: {{INGRESS_HOST}}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{PROJECT_NAME}}-server-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{PROJECT_NAME}}-web-service
                port:
                  number: 80
  tls:
    - hosts:
        - {{INGRESS_HOST}}
      secretName: {{INGRESS_HOST}}-tls
